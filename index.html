<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FORM · Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--s1:#ffffff;--s2:#f0ede8;--s3:#e8e4de;--border:#d4cfc8;--text:#1a1714;--muted:#6b6460;--orange:#d44e1f;--green:#2d8a52;--blue:#2c6db5;--gold:#a07820;--red:#c03030;--purple:#7a4fb5;--r:6px}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;font-size:18px}
/* ─ USER SELECT ─ */
#us{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:59px;letter-spacing:.06em;line-height:1;text-align:center;margin-bottom:6px}
.logo em{color:var(--orange);font-style:normal}
.logo-sub{15px;color:var(--muted);text-align:center;margin-bottom:48px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}
.ucards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:480px;width:100%}
.ucard{flex:1;min-width:175px;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:28px 18px;text-align:center;cursor:pointer;transition:all .25s;user-select:none}
.ucard:hover{transform:translateY(-4px)}.ucard.z:hover{border-color:var(--orange)}.ucard.j:hover{border-color:var(--purple)}
.ua{47px;margin-bottom:12px}.un{21px;font-weight:600;margin-bottom:5px}.ut{16px;color:var(--muted);line-height:1.7}
/* ─ APP ─ */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(245,244,240,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center}
.brand{font-family:'Bebas Neue',sans-serif;font-size:23px;letter-spacing:.06em;padding:13px 12px 13px 0;border-right:1px solid var(--border);margin-right:2px;flex-shrink:0}
.brand em{color:var(--orange);font-style:normal}
.ntabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}.ntabs::-webkit-scrollbar{display:none}
.ntab{padding:14px 12px;font-size:15px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;font-family:'Noto Sans SC',sans-serif;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;margin-bottom:-1px}
.ntab.on{color:var(--orange);border-bottom-color:var(--orange)}.ntab:hover:not(.on){color:var(--text)}
.upill{margin-left:auto;padding:5px 12px;border-radius:20px;font-size:15px;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:none;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;flex-shrink:0;transition:all .2s}
.upill:hover{border-color:var(--text);color:var(--text)}
.cnt{flex:1;padding:20px 14px 80px;max-width:780px;margin:0 auto;width:100%}
.pg{display:none}.pg.on{display:block}
/* ─ SHARED ─ */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:13px}
.ch{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ct{18px;font-weight:600}.cb{padding:15px}
.srow{display:grid;gap:9px;margin-bottom:13px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.sn{font-family:'Bebas Neue',sans-serif;font-size:45px;line-height:1}.sl{14px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;font-weight:500}
.btn{width:100%;padding:12px;border:none;border-radius:4px;font-size:17px;font-family:'Noto Sans SC',sans-serif;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover:not(:disabled){opacity:.83}.btn:disabled{opacity:.32;cursor:not-allowed}
.borg{background:var(--orange);color:white}.bblu{background:var(--blue);color:white}
.bgh{background:var(--s3);border:1px solid var(--border);color:var(--text)}.brd{background:transparent;border:1px solid var(--red);color:var(--red)}
.bsm{padding:5px 10px;font-size:14px;border:1px solid var(--border);background:none;color:var(--muted);border-radius:3px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;transition:all .2s}
.bsm:hover{border-color:var(--red);color:var(--red)}
.fld{margin-bottom:10px}
label{14px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:4px;font-weight:600}
input,select,textarea{background:var(--s2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:16px;padding:9px 11px;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:58px}
.slbl{14px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-weight:600}
.div{height:1px;background:var(--border);margin:18px 0}
.tip{background:rgba(160,120,32,.07);border:1px solid rgba(160,120,32,.25);border-radius:4px;padding:11px 13px;font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.tip strong{color:var(--gold)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.sbar{14px;color:var(--muted);padding:3px 0 11px;display:flex;align-items:center;gap:5px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.sdot.ok{background:var(--green)}.sdot.er{background:var(--red)}.sdot.sy{background:var(--gold);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}
.empty{text-align:center;padding:36px 16px;color:var(--muted)}.ei{37px;margin-bottom:8px}.empty p{15px;line-height:1.8}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ─ CHECKIN ─ */
.cii{display:flex;align-items:flex-start;gap:10px;padding:10px 11px;border-radius:4px;border:1px solid var(--border);margin-bottom:6px;transition:all .18s;user-select:none}
.cii.click{cursor:pointer}
.cii.click:hover:not(.lk){border-color:var(--orange);background:rgba(232,92,42,.04)}
.cii.ck{border-color:var(--green);background:rgba(77,160,107,.07)}
.cii.lk{cursor:default}
.cii.ed{border-color:var(--blue);background:rgba(74,130,196,.04);cursor:default}
.cibox{width:19px;height:19px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .18s;margin-top:1px}
.cii.ck .cibox{background:var(--green);border-color:var(--green)}
.cii.ed .cibox{border-color:var(--blue)}
.ci-m{flex:1;min-width:0}
.ci-nm{17px;line-height:1.3;font-weight:500}
.ci-dr{15px;color:var(--muted);margin-top:2px}
.ci-ei{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.ci-ei input{padding:5px 8px;font-size:15px;flex:1;min-width:110px}
.ci-ei input.dur{max-width:150px}
.ci-ac{display:flex;gap:5px;flex-shrink:0;margin-top:1px}
.ci-del{width:18px;height:18px;border-radius:50%;background:rgba(212,64,64,.15);border:1px solid rgba(212,64,64,.3);color:var(--red);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.ci-del:hover{background:rgba(212,64,64,.3)}
.eedit{padding:2px 7px;font-size:13px;border:1px solid rgba(74,130,196,.35);background:none;color:var(--blue);border-radius:3px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.esave{padding:2px 7px;font-size:13px;border:1px solid var(--green);background:none;color:var(--green);border-radius:3px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap}
.pw{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:9px 0 8px}
.pf{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}
.addr{display:flex;gap:7px;flex-wrap:wrap;padding:0 15px 13px}
.addr input{flex:1;min-width:110px}
.addr input.dur{max-width:140px}
.badd{padding:8px 12px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:14px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;white-space:nowrap;transition:all .2s}
.badd:hover{border-color:var(--blue);color:var(--blue)}
/* ─ CALENDAR ─ */
.cal-h{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cdn{14px;color:var(--muted);text-align:center;font-weight:600}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cc{aspect-ratio:1;border-radius:3px;background:var(--s1);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted);font-weight:500}
.cc.dn{background:var(--green);border-color:var(--green);color:white}
.cc.pt{background:rgba(77,160,107,.28);border-color:rgba(77,160,107,.45)}
.cc.td{border-color:var(--orange)!important;color:var(--text)}
.cc.ft{opacity:.2}.cc.em{background:transparent;border-color:transparent}
/* ─ PHOTO ─ */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px}
.pslot{aspect-ratio:3/4;border-radius:4px;overflow:hidden;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);position:relative;flex-direction:column;gap:4px;cursor:pointer;transition:border-color .2s}
.pslot:hover{border-color:var(--blue)}.pslot img{width:100%;height:100%;object-fit:cover}
.pll{12px;color:var(--muted);letter-spacing:.06em}
.prm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.75);color:white;border:none;border-radius:50%;width:19px;height:19px;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center}
.pslot:hover .prm{display:flex}
.eplbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);font-size:12px;color:white;text-align:center;padding:2px}
/* ─ AI ─ */
.aip{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:var(--r);padding:13px;margin-top:11px}
.all{12px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.ab{16px;line-height:1.85;color:var(--muted)}.ab strong{color:var(--text);font-weight:600}
.asc{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.aisc{padding:4px 10px;border-radius:2px;font-size:15px;border:1px solid;font-weight:600}
.dp{display:flex;gap:4px;align-items:center}
.dp span{width:5px;height:5px;border-radius:50%;background:var(--blue);animation:pu 1.2s ease-in-out infinite}
.dp span:nth-child(2){animation-delay:.2s}.dp span:nth-child(3){animation-delay:.4s}
@keyframes pu{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
/* ─ HISTORY ─ */
.ent{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;animation:fadeUp .3s ease forwards}
.eh{padding:11px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.eps{display:flex;gap:6px;padding:10px 13px;overflow-x:auto}
.ep{width:70px;height:93px;border-radius:3px;overflow:hidden;border:1px solid var(--border);flex-shrink:0;cursor:pointer;position:relative;background:var(--s2)}
.ep img{width:100%;height:100%;object-fit:cover}
.eai{padding:0 13px 11px;font-size:15px;line-height:1.75;color:var(--muted)}.eai strong{color:var(--text);font-weight:600}
.esc{display:flex;gap:5px;flex-wrap:wrap;padding:0 13px 10px}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.cl{14px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.cph{display:flex;gap:5px}
.cp{flex:1;aspect-ratio:3/4;border-radius:3px;overflow:hidden;border:1px solid var(--border);background:var(--s2)}
.cp img{width:100%;height:100%;object-fit:cover;cursor:pointer}
/* ─ WEIGHT ─ */
.ww{width:100%;height:230px;position:relative}
.ctabs{display:flex;gap:6px;flex-wrap:wrap}
.ctab{padding:5px 11px;font-size:14px;letter-spacing:.07em;text-transform:uppercase;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:none;color:var(--muted);font-family:'Noto Sans SC',sans-serif;transition:all .2s;font-weight:600}
.ctab.on{border-color:var(--purple);color:var(--purple);background:rgba(122,79,181,.08)}
.tr{display:grid;grid-template-columns:68px 52px 58px 46px 46px 28px;gap:6px;align-items:center;padding:8px 11px;border-bottom:1px solid var(--border);font-size:16px}
.tr:last-child{border-bottom:none}
.trh{14px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;padding:7px 11px;background:var(--s2);font-weight:600}
.db{14px;padding:3px 7px;border-radius:2px;background:rgba(122,79,181,.12);border:1px solid rgba(122,79,181,.3);color:var(--purple);text-align:center;font-weight:600}
.tadd{padding:11px 15px;display:grid;grid-template-columns:1fr 70px 70px 58px auto;gap:7px;align-items:end}
.bplus{padding:8px 12px;background:var(--purple);color:white;border:none;border-radius:4px;font-size:14px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans SC',sans-serif}
.bplus:hover{opacity:.85}
.plb{padding:11px 13px;background:rgba(192,48,48,.07);border:1px solid rgba(192,48,48,.25);border-radius:4px;font-size:16px;color:var(--muted);margin-bottom:12px;line-height:1.7}
.plb strong{color:var(--red)}
/* ─ LIGHTBOX / TOAST ─ */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;z-index:999;cursor:pointer}
.lb.on{display:flex}.lb img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);border:1px solid var(--border);color:var(--bg);padding:9px 18px;border-radius:4px;font-size:16px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap;max-width:92vw;text-align:center;font-weight:500}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:400px){.cnt{padding:16px 12px 80px}.tadd{grid-template-columns:1fr 58px 58px auto}.tr{grid-template-columns:58px 46px 52px 40px 28px}}
</style>
</head>
<body>

<div id="us">
  <div class="logo">FORM<em>.</em></div>
  <div class="logo-sub">Posture &amp; Wellness Tracker</div>
  <div class="ucards">
    <div class="ucard z" onclick="boot('zoe')">
      <div class="ua">🧘‍♀️</div><div class="un">Zoe</div>

</div>

<div id="app">

    <div class="brand">FORM<em>.</em></div>
    <div class="ntabs" id="ntabs"></div>
    <button class="upill" id="upill" onclick="logout()"></button>
  </div>

</div>

<div class="lb" id="lb" onclick="closeLB()"><img id="lbi" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script>

const TIRZ = [

  {date:'2025-08-08',dose:2.5,weight:92.5,bmi:31.3,visceral:null},

const lk=t=>`form_${CU}_${t}`;
const loadL=(t,d=[])=>{try{const v=localStorage.getItem(lk(t));return v?JSON.parse(v):d}catch{return d}};
const saveL=(t,d)=>localStorage.setItem(lk(t),JSON.stringify(d));
const gwu=()=>localStorage.getItem('form_worker_url')||'';

async function cFetch(path,opts={}) {
  const url=gwu();if(!url)return null;
  try{const r=await fetch(`${url}${path}`,{headers:{'X-Form-Auth':'form2024','Content-Type':'application/json',...(opts.headers||{})},...opts});return r.ok?await r.json():null;}
  catch{return null;}
}
async function getData(t) {
  const c=await cFetch(`/data/${CU}/${t}`);
  if(c!==null){saveL(t,c);return c;}
  return loadL(t);
}
async function setData(t,d) {
  saveL(t,d);setSY('sy');
  const ok=await cFetch(`/data/${CU}/${t}`,{method:'POST',body:JSON.stringify(d)});
  setSY(ok!==null?'ok':gwu()?'er':'off');
}
function setSY(s) {

}

function toggleEdit() {

    editMode=true;
    drawItems(items,tod,true);
  } else {

    const updated=[];
    rows.forEach((row,i)=>{

      if(n&&n.value.trim())updated.push({id:items[i]?.id||`c${Date.now()}${i}`,name:n.value.trim(),dur:dur?.value.trim()||''});

function delItem(i){const it=getItems();it.splice(i,1);saveItems(it);const tod=loadL('checkins',[]).find(c=>c.date===TODAY);drawItems(it,tod,true);}
function addItem(){
  const n=document.getElementById('nin')?.value.trim();
  if(!n)return;
  const dur=document.getElementById('nid')?.value.trim()||'';
  const it=getItems();it.push({id:`c${Date.now()}`,name:n,dur});saveItems(it);
  const tod=loadL('checkins',[]).find(c=>c.date===TODAY);

async function submitCI(){
  const zh=CU==='zoe';

  if(!done.length){toast(zh?'至少完成一项 😅':'Complete at least one item 😅');return;}
  const all=await getData('checkins');
  const idx=all.findIndex(c=>c.date===TODAY);
  const entry={date:TODAY,done,total:rows.length};
  if(idx>=0)all[idx]=entry;else all.push(entry);
  await setData('checkins',all);
  rCI();
  toast(done.length===rows.length?(zh?'🎉 全部完成！':'🎉 All done!'):(zh?`✅ ${done.length}/${rows.length}`:`✅ ${done.length}/${rows.length} done`));
}
function rCal(all){
  const map=all.reduce((m,c)=>{m[c.date]=c;return m;},{});
  const now=new Date(),yr=now.getFullYear(),mo=now.getMonth();
  const first=new Date(yr,mo,1).getDay(),days=new Date(yr,mo+1,0).getDate();
  const zh=CU==='zoe';
  const dn=zh?['日','一','二','三','四','五','六']:['Su','Mo','Tu','We','Th','Fr','Sa'];
  document.getElementById('calh').innerHTML=dn.map(d=>`<div class="cdn">${d}</div>`).join('');
  const g=document.getElementById('calg');g.innerHTML='';
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='cc em';g.appendChild(c);}
  for(let d=1;d<=days;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const c=document.createElement('div'),e=map[ds];
    let cl='cc';if(ds===TODAY)cl+=' td';if(e)cl+=e.done.length===e.total?' dn':' pt';if(ds>TODAY)cl+=' ft';
    c.className=cl;c.textContent=d;g.appendChild(c);
  }
}

  const cll=document.getElementById('cl');
  if(!cis.length){cll.innerHTML=`<div class="empty"><div class="ei">📅</div><p>${zh?'还没有打卡记录':'No check-ins yet'}</p></div>`;}
  else cll.innerHTML=cis.map(c=>{const p=Math.round(c.done.length/c.total*100);return `<div class="ent" style="padding:11px 13px;display:flex;align-items:center;justify-content:space-between"><div><div style="16px;font-weight:500">${fd(c.date,zh)}</div><div style="13px;color:var(--muted);margin-top:2px">${zh?`完成 ${c.done.length}/${c.total}`:`${c.done.length}/${c.total} items`}</div></div><div style="font-family:'Bebas Neue',sans-serif;font-size:35px;color:${p===100?'var(--green)':'var(--gold)'}">${p}%</div></div>`;}).join('');
}
async function delPost(i){if(!confirm(CU==='zoe'?'确定删除？':'Delete?'))return;const all=loadL('posture');all.splice(i,1);await setData('posture',all);rHI();toast(CU==='zoe'?'已删除':'Deleted');}

// ══════════════════════════════════════════════════════
// WEIGHT — JASON ONLY
// ══════════════════════════════════════════════════════
async function rWT(){
  const el=document.getElementById('pg-wt');if(!el)return;
  let tirz=loadL('tirz');
  if(!tirz||!tirz.length){tirz=TIRZ.map(r=>({...r}));saveL('tirz',tirz);}
  const wt=tirz.filter(r=>r.weight!=null).sort((a,b)=>a.date.localeCompare(b.date));
  const s=wt[0]?.weight||0,cur=wt[wt.length-1]?.weight||0;
  const lost=(s-cur).toFixed(1),minW=Math.min(...wt.map(r=>r.weight));
  const curBMI=wt[wt.length-1]?.bmi||'—',curV=wt[wt.length-1]?.visceral||'—';
  const r6=wt.slice(-6),rng=Math.max(...r6.map(r=>r.weight))-Math.min(...r6.map(r=>r.weight));
  const plateau=r6.length>=4&&rng<1.5;

  el.innerHTML=`
<div class="srow" style="grid-template-columns:repeat(4,1fr)">
  <div class="stat"><div class="sn" style="color:var(--purple)">${cur}</div><div class="sl">Current kg</div></div>
  <div class="stat"><div class="sn" style="color:var(--green)">${lost}</div><div class="sl">kg Lost</div></div>
  <div class="stat"><div class="sn" style="color:var(--blue)">${curBMI}</div><div class="sl">BMI</div></div>
  <div class="stat"><div class="sn" style="color:var(--gold)">${curV}</div><div class="sl">Visceral</div></div>
</div>
${plateau?`<div class="plb"><strong>⚠️ Plateau detected</strong> — Weight within ${rng.toFixed(1)}kg across ${r6.length} injections (since ~${r6[0].date.slice(0,7)}). Visible stall since late 2025. Worth discussing with your doctor.</div>`:''}
<div class="card">
  <div class="ch">
    <div class="ct">Weight &amp; Tirzepatide Trend</div>
    <div class="ctabs">
      <button class="ctab on" onclick="swCT('weight',this)">Weight</button>
      <button class="ctab" onclick="swCT('bmi',this)">BMI</button>
      <button class="ctab" onclick="swCT('dose',this)">Dose</button>
    </div>
  </div>
  <div class="cb"><div class="ww"><canvas id="wc"></canvas></div></div>
</div>
<div class="card">
  <div class="ch"><div class="ct">Tirzepatide Log</div><div style="13px;color:var(--muted)">${tirz.length} injections · ${wt.length} weigh-ins</div></div>
  <div class="tr trh"><span>Date</span><span>Dose</span><span>Weight</span><span>BMI</span><span>Visceral</span><span></span></div>
  <div id="tl"></div>
  <div class="tadd">
    <div><label>Date</label><input type="date" id="td" value="${TODAY}"></div>
    <div><label>Dose mg</label><input type="number" id="tdo" value="7.5" step="0.5" min="2.5" max="15" style="text-align:center"></div>
    <div><label>Weight kg</label><input type="number" id="tw" placeholder="—" step="0.05"></div>
    <div><label>BMI</label><input type="number" id="tb" placeholder="—" step="0.1"></div>
    <button class="bplus" onclick="addT()">+ Add</button>
  </div>
</div>`;

  rTL(tirz);
  if(wChart){wChart.destroy();wChart=null;}
  setTimeout(()=>drawWT('weight',tirz),80);
}
function rTL(tirz){
  const el=document.getElementById('tl');if(!el)return;
  el.innerHTML=[...tirz].reverse().map((r,i)=>`
    <div class="tr">
      <span style="14px;color:var(--muted)">${r.date.slice(5).replace('-','/')}</span>
      <span class="db">${r.dose}mg</span>
      <span style="font-family:'DM Mono',monospace;15px">${r.weight||'—'}</span>
      <span style="14px;color:var(--muted)">${r.bmi||'—'}</span>
      <span style="14px;color:var(--muted)">${r.visceral||'—'}</span>
      <button class="bsm" onclick="delT(${tirz.length-1-i})">×</button>
    </div>`).join('');
}
async function addT(){
  const date=document.getElementById('td')?.value;
  const dose=parseFloat(document.getElementById('tdo')?.value);
  const weight=parseFloat(document.getElementById('tw')?.value)||null;
  const bmi=parseFloat(document.getElementById('tb')?.value)||null;
  if(!date||!dose){toast('Date and dose required');return;}
  let tirz=loadL('tirz');if(!tirz||!tirz.length)tirz=TIRZ.map(r=>({...r}));
  const idx=tirz.findIndex(r=>r.date===date);
  const entry={date,dose,weight,bmi,visceral:null};
  if(idx>=0)tirz[idx]=entry;else{tirz.push(entry);tirz.sort((a,b)=>a.date.localeCompare(b.date));}
  await setData('tirz',tirz);rWT();toast('✅ Saved');
}
async function delT(i){
  if(!confirm('Delete?'))return;
  let tirz=loadL('tirz');tirz.splice(i,1);await setData('tirz',tirz);rWT();toast('Deleted');
}
function swCT(type,btn){document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');drawWT(type,loadL('tirz')||[]);}
function drawWT(type,tirz){
  const wd=tirz.filter(r=>type==='dose'?r.dose:type==='bmi'?r.bmi!=null:r.weight!=null).sort((a,b)=>a.date.localeCompare(b.date));
  const labels=wd.map(r=>r.date.slice(5).replace('-','/'));
  const vals=wd.map(r=>type==='dose'?r.dose:type==='bmi'?r.bmi:r.weight);
  const canvas=document.getElementById('wc');if(!canvas)return;
  if(wChart){wChart.destroy();wChart=null;}
  const cols={weight:'#9b6fc4',bmi:'#4a82c4',dose:'#4da06b'};
  const lbs={weight:'Weight (kg)',bmi:'BMI',dose:'Tirzepatide (mg)'};
  const ptC=vals.map((v,i)=>{if(type!=='weight'||i===0)return cols[type];return Math.abs(v-vals[i-1])<0.3?'#d44040':cols[type];});
  wChart=new Chart(canvas.getContext('2d'),{
    type:'line',
    data:{labels,datasets:[{label:lbs[type],data:vals,borderColor:cols[type],backgroundColor:cols[type]+'22',pointBackgroundColor:ptC,pointRadius:5,borderWidth:2,tension:0.35,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c1c',borderColor:'#2e2e2e',borderWidth:1,titleColor:'#f2ece4',bodyColor:'#5e5850',callbacks:{afterBody:items=>{const d=wd[items[0].dataIndex];return type==='weight'&&d.dose?[`Dose: ${d.dose}mg`]:[];}}}},scales:{x:{grid:{color:'#1a1a1a'},ticks:{color:'#5e5850',font:{size:10},maxRotation:45}},y:{grid:{color:'#1a1a1a'},ticks:{color:'#5e5850',font:{size:10}},min:type==='weight'?Math.floor(Math.min(...vals))-2:undefined,max:type==='weight'?Math.ceil(Math.max(...vals))+2:undefined}}}
  });
}

// ══════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════
function rST(){
  const el=document.getElementById('pg-st');if(!el)return;
  const zh=CU==='zoe',url=gwu();
  el.innerHTML=`
<div class="slbl">${zh?'云端同步':'Cloud Sync'}</div>
<div class="tip"><strong>${zh?'配置后所有设备自动同步':'Configure once, sync everywhere'}</strong> — ${zh?'部署步骤见 DEPLOY.md':'See DEPLOY.md for setup steps.'}</div>
<div class="card"><div class="cb">
  <div class="fld"><label>Cloudflare Worker URL</label>
    <div style="display:flex;gap:7px">
      <input type="text" id="wu" value="${url}" placeholder="https://posture-sync.yourname.workers.dev">
      <button style="padding:8px 12px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:15px;cursor:pointer;font-family:inherit;white-space:nowrap" onclick="saveWU()">${zh?'保存':'Save'}</button>
    </div>
  </div>
  <div style="14px;color:var(--muted)">${url?(zh?'✅ 已配置':'✅ Configured'):(zh?'未配置':'Not configured')}</div>
</div></div>
<div class="card" style="margin-top:4px"><div class="cb">
  <div style="15px;color:var(--muted);line-height:1.9;margin-bottom:13px">
    ${zh?'用户':'User'}: ${CFG[CU].name}<br>
    ${zh?'打卡记录':'Check-ins'}: ${loadL('checkins').length}<br>
    ${zh?'体态记录':'Posture records'}: ${loadL('posture').length}${CU==='jason'?`<br>Injection log: ${loadL('tirz',[]).length} entries`:''}
  </div>
  <button class="btn bgh" style="margin-bottom:7px" onclick="syncNow()">${zh?'🔄 立即同步':'🔄 Sync Now'}</button>
  <button class="btn brd" onclick="clearAll()">${zh?'清空本地数据':'Clear Local Data'}</button>
</div></div>`;
}
function saveWU(){const u=document.getElementById('wu')?.value.trim().replace(/\/$/,'');localStorage.setItem('form_worker_url',u||'');toast(CU==='zoe'?'已保存':'Saved');}
async function syncNow(){const zh=CU==='zoe';toast(zh?'同步中…':'Syncing…');for(const t of['checkins','posture',...(CU==='jason'?['tirz']:[])]) {const d=await cFetch(`/data/${CU}/${t}`);if(d)saveL(t,d);}toast(zh?'✅ 同步完成':'✅ Done');}
function clearAll(){if(!confirm(CU==='zoe'?'确定清空？':'Clear all local data?'))return;['checkins','posture','tirz','items'].forEach(t=>localStorage.removeItem(lk(t)));toast(CU==='zoe'?'已清空':'Cleared');}

// ══════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════
function fd(ds,zh){const d=new Date(ds+'T00:00:00');return zh?`${d.getMonth()+1}月${d.getDate()}日`:d.toLocaleDateString('en',{month:'short',day:'numeric'});}
function toast(msg,dur=2600){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),dur);}
function openLB(src){document.getElementById('lbi').src=src;document.getElementById('lb').classList.add('on');}
function closeLB(){document.getElementById('lb').classList.remove('on');}
</script>
</body>
